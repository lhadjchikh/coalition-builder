AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Bootstrap cross-account VPC peering and DNS role in the shared account.
  Allows prod and dev accounts to assume this role to accept VPC peering
  connections and manage Route53 DNS records.

Parameters:
  ProdAccountId:
    Type: String
    Description: AWS account ID for the production account

  DevAccountId:
    Type: String
    Description: AWS account ID for the development account

Resources:
  VPCPeeringAccepterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: vpc-peering-accepter
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${ProdAccountId}:role/github-actions-prod"
                - !Sub "arn:aws:iam::${DevAccountId}:role/github-actions-dev"
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${ProdAccountId}:root"
                - !Sub "arn:aws:iam::${DevAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              ArnLike:
                aws:PrincipalArn:
                  - !Sub "arn:aws:iam::${ProdAccountId}:role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_AdministratorAccess_*"
                  - !Sub "arn:aws:iam::${DevAccountId}:role/aws-reserved/sso.amazonaws.com/AWSReservedSSO_AdministratorAccess_*"
      Policies:
        - PolicyName: vpc-peering-accepter
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AcceptVpcPeeringConnection
                  - ec2:DeleteVpcPeeringConnection
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:ReplaceRoute
                  - ec2:DescribeRouteTables
                  - ec2:DescribeVpcs
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "*"
        - PolicyName: dns-record-writer
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                Resource: "*"
      Tags:
        - Key: Name
          Value: vpc-peering-accepter

Outputs:
  RoleArn:
    Description: ARN of the cross-account shared services role
    Value: !GetAtt VPCPeeringAccepterRole.Arn

  RoleName:
    Description: Name of the cross-account shared services role
    Value: !Ref VPCPeeringAccepterRole
