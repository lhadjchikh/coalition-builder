AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Bootstrap VPC peering accepter role in the shared account.
  Allows prod and dev accounts to assume this role to accept VPC peering connections.

Parameters:
  ProdAccountId:
    Type: String
    Description: AWS account ID for the production account

  DevAccountId:
    Type: String
    Description: AWS account ID for the development account

Resources:
  VPCPeeringAccepterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: vpc-peering-accepter
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${ProdAccountId}:root"
                - !Sub "arn:aws:iam::${DevAccountId}:root"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: vpc-peering-accepter
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AcceptVpcPeeringConnection
                  - ec2:DeleteVpcPeeringConnection
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:ReplaceRoute
                  - ec2:DescribeRouteTables
                  - ec2:DescribeVpcs
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "*"
      Tags:
        - Key: Name
          Value: vpc-peering-accepter

Outputs:
  RoleArn:
    Description: ARN of the VPC peering accepter role
    Value: !GetAtt VPCPeeringAccepterRole.Arn

  RoleName:
    Description: Name of the VPC peering accepter role
    Value: !Ref VPCPeeringAccepterRole
